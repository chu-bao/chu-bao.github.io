
<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>分类 · SYLVIE</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, 'Microsoft YaHei', 'PingFang SC', sans-serif;
            background: #f8f9fa;
            color: #1e2e3e;
            line-height: 1.7;
        }

     
        /* 顶部横幅 - 添加朦胧遮罩 */
.custom-top-banner {
    width: 100%;
    height: 280px !important;
    min-height: 280px !important;
    max-height: 280px !important;
    background: url('/images/blossom.png') center top / cover no-repeat;
    background-color: #2c3e50;
    position: relative;
    margin-bottom: 30px;
    flex-shrink: 0;
    flex-grow: 0;
    overflow: hidden;
    background-attachment: scroll;
}

/* 朦胧遮罩层 */
.custom-top-banner::before {
    content: '';
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0, 0, 0, 0.05);  /* 黑色半透明，0.3透明度 */
    z-index: 1;
    pointer-events: none;  /* 让点击穿透到导航按钮 */
}

/* 确保导航在遮罩之上 */
.custom-top-nav {
    position: relative;
    z-index: 2;
}
        
        .nav-wrapper {
            max-width: 1300px;
            margin: 0 auto;
            padding: 0 2rem;
            display: flex;
            justify-content: flex-end;
            align-items: center;
        }
        
        .my-nav-menu {
            display: flex;
            gap: 0.5rem;
        }
        
        .nav-link {
            padding: 0.6rem 1.8rem;
            text-decoration: none;
            color: rgba(255, 255, 255, 0.9);
            font-size: 1.1rem;
            border-radius: 20px;
            transition: all 0.25s ease;
            position: relative;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Microsoft YaHei", "PingFang SC", "Hiragino Sans GB", sans-serif;
            font-weight: 500;
        }
        
        .nav-link:hover {
            color: #FF6600 !important;
           
            text-decoration: underline dashed #FF6600 2px;
            text-underline-offset: 10px;
        }
        
        .nav-link.active {
            color: #FF6600 !important;
            font-weight: 600;
        }
        
        /* ===== 内容区域 ===== */
        .page-container {
            max-width: 1000px;
            margin: 0 auto;
            padding: 0 2rem;
            position: relative;
            z-index: 1;
        }
        
        h1 {
            font-size: 1.6rem;
            color: #1e2e3e;
            margin-bottom: 2rem;
            padding-bottom: 0.8rem;
            border-bottom: 2px dashed #FF6600;
        }
        
        .back-link {
            font-size: 0.9rem;
            margin-left: 1rem;
            color: #FF6600;
            text-decoration: none;
        }
        
        .back-link:hover {
            text-decoration: underline;
        }
        
        /* 分类列表 */
        .categories-container {
            display: flex;
            flex-direction: column;
            gap: 2rem;
        }
        
        .category-group {
            background: white;
            border-radius: 16px;
            padding: 1.5rem;
            box-shadow: 0 5px 25px rgba(0,0,0,0.03);
            border: 1px solid rgba(0,0,0,0.03);
        }
        
        .category-header {
            display: flex;
            align-items: center;
            gap: 1rem;
            margin-bottom: 1rem;
            cursor: pointer;
            padding: 0.5rem;
            border-radius: 12px;
            transition: all 0.2s ease;
        }
        
        .category-header:hover {
            background: rgba(255,102,0,0.05);
        }
        
        .category-name {
            font-size: 1.3rem;
            font-weight: 600;
            color: #FF6600;
        }
        
        .category-count {
            background: rgba(255,102,0,0.1);
            color: #FF6600;
            padding: 0.2rem 0.8rem;
            border-radius: 20px;
            font-size: 0.9rem;
            font-weight: 500;
        }
        
        .category-posts {
            list-style: none;
            padding-left: 1rem;
        }
        
        .category-post-item {
            display: flex;
            align-items: baseline;
            padding: 0.5rem 0;
            border-bottom: 1px dashed #eee;
        }
        
        .category-post-date {
            color: #666;
            font-size: 0.85rem;
            width: 100px;
            flex-shrink: 0;
        }
        
        .category-post-title a {
            color: #1e2e3e;
            text-decoration: none;
            font-size: 1rem;
            transition: color 0.2s ease;
        }
        
        .category-post-title a:hover {
            color: #FF6600;
        }
        
        .loading-state {
            text-align: center;
            padding: 3rem;
            color: #666;
        }
        
        /* 箭头动画 */
        .arrow {
            transition: transform 0.3s ease;
            margin-left: auto;
            color: #999;
        }
        
        .category-header.collapsed .arrow {
            transform: rotate(-90deg);
        }
        
        .category-posts.collapsed {
            display: none;
        }
        
        /* 空状态 */
        .empty-state {
            text-align: center;
            padding: 3rem;
            color: #666;
        }

        /* 响应式 - 确保小屏幕下导航正常 */
        @media (max-width: 768px) {
            .custom-top-banner {
                height: 280px !important;
                min-height: 280px !important;
                max-height: 280px !important;
            }
            .nav-wrapper {
                flex-direction: column;
                gap: 1rem;
                justify-content: center;
            }
            .my-nav-menu {
                flex-wrap: wrap;
                justify-content: center;
            }
        }
    </style>
</head>
<body>
    <!-- ===== 顶部横幅 - 与博客页完全一致 ===== -->
    <header class="custom-top-banner">
        <nav class="custom-top-nav">
            <div class="nav-wrapper">
                <div class="my-nav-menu">
                    <a href="/" class="nav-link">🏡 首页</a>
                    <a href="/blog-custom/" class="nav-link">📝 博客</a>
                    <a href="/custom-archives/" class="nav-link">🗄️ 归档</a>
                    <a href="/categories/" class="nav-link active">🏷️ 分类</a>
                </div>
            </div>
        </nav>
    </header>

    <!-- ===== 内容区域 ===== -->
    <div class="page-container">
        <h1 id="page-title">📚 文章分类</h1>
        
        <div id="categories-container" class="categories-container">
            <div class="loading-state">加载分类中...</div>
        </div>
    </div>

    <script>
        (function() {
            const container = document.getElementById('categories-container');
            const pageTitle = document.getElementById('page-title');
            
            // 获取URL参数
            const urlParams = new URLSearchParams(window.location.search);
            const selectedCat = urlParams.get('cat');
            
            fetch('/content.json?t=' + Date.now())
                .then(res => {
                    if (!res.ok) throw new Error('content.json 不存在');
                    return res.json();
                })
                .then(data => {
                    let posts = Array.isArray(data) ? data : (data.posts || []);
                    
                    if (posts.length === 0) {
                        container.innerHTML = '<div class="empty-state">暂无文章</div>';
                        return;
                    }
                    
                    // 如果有 selectedCat 参数，只显示该分类的文章
                    if (selectedCat) {
                        // 筛选属于该分类的文章
                        const filteredPosts = posts.filter(post => {
                            if (!post.categories || post.categories.length === 0) return false;
                            return post.categories.some(cat => {
                                let catName = '';
                                if (typeof cat === 'string') {
                                    catName = cat;
                                } else if (cat && typeof cat === 'object') {
                                    catName = cat.name || '';
                                }
                                return catName === selectedCat;
                            });
                        });
                        
                        if (filteredPosts.length === 0) {
                            container.innerHTML = `
                                <div class="empty-state">
                                    分类 "${selectedCat}" 下暂无文章<br>
                                    <a href="/categories/" style="color:#FF6600; margin-top:1rem; display:inline-block;">返回全部分类</a>
                                </div>
                            `;
                            return;
                        }
                        
                        // 修改页面标题
                        document.title = `${selectedCat} · 分类 · SYLVIE`;
                        
                        // 修改页面头部
                       pageTitle.innerHTML = `<span style="font-size: 1.5rem;">📚 分类：${selectedCat}</span> <a href="/categories/" class="back-link">返回全部</a>`;
                        
                        // 按日期排序
                        filteredPosts.sort((a, b) => new Date(b.date) - new Date(a.date));
                        
                        // 生成文章列表
let postsHtml = '';
filteredPosts.forEach(post => {
    let dateStr = '日期未知';
    try {
        const d = new Date(post.date);
        dateStr = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
    } catch(e) {}
    
    const postPath = post.path.startsWith('/') ? post.path : '/' + post.path;
    const articleLink = `/post-template.html?path=${encodeURIComponent(postPath)}`;
    
    postsHtml += `
        <li class="category-post-item">
            <span class="category-post-date">${dateStr}</span>
            <span class="category-post-title">
                <a href="${articleLink}">${post.title || '无标题'}</a>
            </span>
        </li>
    `;
});
                        
                        container.innerHTML = `
                            <div class="category-group">
                                <div class="category-header" style="cursor:default;">
                                    <span class="category-name">${selectedCat}</span>
                                    <span class="category-count">${filteredPosts.length}篇</span>
                                </div>
                                <ul class="category-posts" style="display:block;">
                                    ${postsHtml}
                                </ul>
                            </div>
                        `;
                        return;
                    }
                    
                    // 正常显示所有分类
                    let categoriesMap = new Map();
                    
                    posts.forEach(post => {
                        if (post.categories && post.categories.length > 0) {
                            post.categories.forEach(cat => {
                                // 获取分类名称
                                let catName = '';
                                if (typeof cat === 'string') {
                                    catName = cat;
                                } else if (cat && typeof cat === 'object') {
                                    catName = cat.name || '';
                                }
                                
                                if (!catName) return;
                                
                                if (!categoriesMap.has(catName)) {
                                    categoriesMap.set(catName, []);
                                }
                                categoriesMap.get(catName).push(post);
                            });
                        }
                    });
                    
                    // 如果没有分类
                    if (categoriesMap.size === 0) {
                        container.innerHTML = '<div class="empty-state">暂无分类</div>';
                        return;
                    }
                    
                    // 生成分类HTML
                    let html = '';
                    
                    // 按分类名称排序
                    const sortedCategories = Array.from(categoriesMap.entries())
                        .sort((a, b) => a[0].localeCompare(b[0]));
                    
                    sortedCategories.forEach(([catName, catPosts]) => {
                        // 按日期排序文章
                        catPosts.sort((a, b) => new Date(b.date) - new Date(a.date));
                        
                        // 生成文章列表HTML
let postsHtml = '';
catPosts.forEach(post => {
    let dateStr = '日期未知';
    try {
        const d = new Date(post.date);
        dateStr = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
    } catch(e) {}
    
    const postPath = post.path.startsWith('/') ? post.path : '/' + post.path;
    const articleLink = `/post-template.html?path=${encodeURIComponent(postPath)}`;
    
    postsHtml += `
        <li class="category-post-item">
            <span class="category-post-date">${dateStr}</span>
            <span class="category-post-title">
                <a href="${articleLink}">${post.title || '无标题'}</a>
            </span>
        </li>
    `;
});
                        
                        // 生成分类组HTML
                        html += `
                            <div class="category-group">
                                <div class="category-header" onclick="toggleCategory(this)">
                                    <span class="category-name">${catName}</span>
                                    <span class="category-count">${catPosts.length}篇</span>
                                    <span class="arrow">▼</span>
                                </div>
                                <ul class="category-posts">
                                    ${postsHtml}
                                </ul>
                            </div>
                        `;
                    });
                    
                    container.innerHTML = html;
                })
                .catch(error => {
                    container.innerHTML = `
                        <div style="text-align:center; padding:3rem; color:#b45309;">
                            <span style="font-size:1.5rem;">⚠️</span>
                            <h3 style="margin:1rem 0;">加载失败</h3>
                            <p>${error.message}</p>
                        </div>
                    `;
                });
        })();
        
        // 切换分类展开/折叠
        window.toggleCategory = function(header) {
            header.classList.toggle('collapsed');
            const postsList = header.nextElementSibling;
            postsList.classList.toggle('collapsed');
        };
    </script>
</body>
</html>
