<!DOCTYPE html>
<html>
<head>
    <title>Welcome</title>
    <style>
    body {
        background: url('/images/bg.jpg') center/cover no-repeat fixed;
        margin: 0;
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        color: white;
        font-family: 'Segoe UI', sans-serif;
        position: relative;
        overflow: hidden;
    }
    
    body::before {
        content: '';
        position: absolute;
        top: 0; left: 0; right: 0; bottom: 0;
        background: rgba(0,0,0,0.1);
        z-index: 0;
    }
    
    .content {
        position: relative;
        z-index: 3;
        text-align: center;
        padding: 2rem;
        margin-top: -50px;
        margin-left: -800px;
    }
    
    h1 {
        font-size: 2.5rem;
        margin-bottom: 1rem;
        letter-spacing: 5px;
        font-weight: 300;
    }
    
    .buttons {
        margin-top: 2rem;
    }
    
    .btn {
        color: white;
        border: 2px solid white;
        padding: 10px 32px;
        margin: 0 10px;
        text-decoration: none;
        display: inline-block;
        transition: 0.3s;
        font-size: 0.9rem;
    }
    
    a[href*="github"] {
        padding: 9px 28px;
    }
    
    .btn:hover {
        background: white;
        color: black;
    }

    /* 蒲公英图片样式 */
    .dandelion-img {
        position: fixed;
        pointer-events: none;
        z-index: 1;
        opacity: 0;
        transform-origin: center;
        width: 50px;
        height: auto;
        will-change: transform, opacity;
        filter: 
            drop-shadow(0 0 8px rgba(255,255,255,0.5))
            drop-shadow(0 0 15px rgba(255,255,255,0.2))
            brightness(1.15) /* 更白 */
            contrast(1.05);
        -webkit-filter: 
            drop-shadow(0 0 8px rgba(255,255,255,0.5))
            drop-shadow(0 0 15px rgba(255,255,255,0.2))
            brightness(1.15)
            contrast(1.05);
        mix-blend-mode: screen; /* 更通透的混合模式 */
    }
</style>
</head>
<body>
    <div class="content">
        <h1>SYLVIE</h1>
        <div class="buttons">
            <a href="blog-custom.html" class="btn">Blog</a>
            <a href="https://github.com" class="btn">GitHub</a>
        </div>
    </div>

    <!-- 测试按钮 -->
    <button id="testBtn" style="
        position: fixed;
        top: 10px;
        right: 10px;
        z-index: 1000;
        padding: 8px 16px;
        background: rgba(255,255,255,0.9);
        color: #333;
        border: 1px solid rgba(255,255,255,0.5);
        border-radius: 4px;
        cursor: pointer;
        font-size: 12px;
    ">
        更多蒲公英 🌼
    </button>
    
    <script>
    // 蒲公英图片URL
    const DANDELION_IMAGE_URL = '/images/dandelion.png';
    
    // 飘逸的蒲公英管理器
    class DandelionManager {
        constructor() {
            this.dandelions = [];
            this.maxDandelions = 35; // 适当数量，避免过多
            this.lastAnimationTime = 0;
            this.animationFrameId = null;
            this.init();
        }
        
        init() {
            console.log('初始化蒲公英管理器');
            
            // 预加载图片
            this.preloadImage();
            
            // 测试按钮
            document.getElementById('testBtn').addEventListener('click', () => {
                this.createDandelionGroup(5);
            });
            
            // 点击创建蒲公英
            document.addEventListener('click', (e) => {
                if (e.target.id !== 'testBtn' && !e.target.closest('.btn')) {
                    this.createDandelion(e.clientX, e.clientY);
                }
            });
            
            // 启动飘逸动画
            this.animateFloating();
        }
        
        preloadImage() {
            const img = new Image();
            img.src = DANDELION_IMAGE_URL;
            img.onload = () => {
                console.log('蒲公英图片加载成功，开始飘逸动画');
                this.startCreating();
            };
            img.onerror = () => {
                console.error('蒲公英图片加载失败:', DANDELION_IMAGE_URL);
                this.useCSSDandelion();
            };
        }
        
        useCSSDandelion() {
            console.log('使用CSS蒲公英');
            const style = document.createElement('style');
            style.textContent = `
                .css-dandelion {
                    position: fixed;
                    width: 50px;
                    height: 50px;
                    background: 
                        radial-gradient(circle at 30% 30%, 
                            rgba(255,255,255,0.85) 0%,
                            rgba(255,255,255,0.6) 20%,
                            rgba(255,255,255,0.25) 50%,
                            transparent 70%);
                    border-radius: 50%;
                    box-shadow: 
                        0 0 20px rgba(255,255,255,0.4),
                        8px 8px 15px rgba(255,255,255,0.2);
                    filter: blur(0.8px) brightness(1.2);
                    pointer-events: none;
                    z-index: 1;
                    mix-blend-mode: screen;
                }
            `;
            document.head.appendChild(style);
            this.startCreating();
        }
        
        createDandelion(startX, startY = -80) {
            // 限制最大数量
            if (this.dandelions.length >= this.maxDandelions) {
                const oldest = this.dandelions.shift();
                if (oldest && oldest.element.parentNode) {
                    oldest.element.parentNode.removeChild(oldest.element);
                }
            }
            
            const element = document.createElement('img');
            element.className = 'dandelion-img';
            element.src = DANDELION_IMAGE_URL;
            element.alt = '蒲公英';
            
            // 飘逸参数 - 更慢更随机的运动
            const scale = 0.6 + Math.random() * 0.7; // 大小：0.6-1.3
            const initialRotate = Math.random() * 360;
            
            // 更慢的下落速度：18-30秒
            const duration = 18000 + Math.random() * 12000;
            
            // 更复杂的水平移动模式
            const horizontalAmplitude = 80 + Math.random() * 120; // 水平振幅
            const horizontalFrequency = 0.0003 + Math.random() * 0.0004; // 水平波动频率
            
            // 旋转速度更慢更随机
            const rotateSpeed = -0.3 + Math.random() * 0.6;
            
            // 垂直波动参数 - 让蒲公英上下飘动
            const verticalAmplitude = 20 + Math.random() * 30;
            const verticalFrequency = 0.0005 + Math.random() * 0.0006;
            
            // 更白更透明
            const opacity = 0.75 + Math.random() * 0.15;
            
            // 设置初始位置
            element.style.left = startX + 'px';
            element.style.top = startY + 'px';
            element.style.transform = `translate3d(0, 0, 0) rotate(${initialRotate}deg) scale(${scale})`;
            element.style.opacity = opacity.toString();
            
            document.body.appendChild(element);
            
            // 飘逸的数据结构
            const dandelionData = {
                element: element,
                startX: parseFloat(startX),
                startY: parseFloat(startY),
                startTime: performance.now(),
                duration: duration,
                scale: scale,
                initialRotate: initialRotate,
                rotateSpeed: rotateSpeed,
                horizontalAmplitude: horizontalAmplitude,
                horizontalFrequency: horizontalFrequency,
                verticalAmplitude: verticalAmplitude,
                verticalFrequency: verticalFrequency,
                opacity: opacity,
                // 随机相位偏移
                phaseOffsetX: Math.random() * Math.PI * 2,
                phaseOffsetY: Math.random() * Math.PI * 2
            };
            
            this.dandelions.push(dandelionData);
            
            return dandelionData;
        }
        
        createDandelionGroup(count = 7) {
            for (let i = 0; i < count; i++) {
                setTimeout(() => {
                    const startX = Math.random() * window.innerWidth;
                    this.createDandelion(startX, -60 - Math.random() * 40);
                }, i * 250); // 稍慢的创建间隔
            }
        }
        
        startCreating() {
            console.log('开始创建飘逸的蒲公英');
            
            // 初始创建 - 分批次，更有层次感
            setTimeout(() => {
                this.createDandelionGroup(6);
                setTimeout(() => this.createDandelionGroup(5), 800);
                setTimeout(() => this.createDandelionGroup(4), 1600);
            }, 500);
            
            // 定期创建 - 间隔更长，更自然
            setInterval(() => {
                if (this.dandelions.length < this.maxDandelions * 0.6) {
                    this.createDandelionGroup(3 + Math.floor(Math.random() * 3));
                }
            }, 7000); // 7秒间隔
        }
        
        animateFloating() {
            const now = performance.now();
            
            // 更新所有蒲公英
            for (let i = this.dandelions.length - 1; i >= 0; i--) {
                const d = this.dandelions[i];
                const elapsed = now - d.startTime;
                
                if (elapsed > d.duration) {
                    // 动画结束
                    if (d.element.parentNode) {
                        d.element.parentNode.removeChild(d.element);
                    }
                    this.dandelions.splice(i, 1);
                    continue;
                }
                
                const progress = elapsed / d.duration;
                
                // 使用缓动函数让开始和结束更自然
                const easeProgress = this.easeInOutSine(progress);
                
                // 基础垂直位置 - 更慢的下落
                const baseY = d.startY + (window.innerHeight + 100) * easeProgress;
                
                // 水平飘动 - 正弦波运动
                const horizontalOffset = Math.sin(now * d.horizontalFrequency + d.phaseOffsetX) * 
                                       d.horizontalAmplitude * (1 - easeProgress * 0.3);
                
                // 垂直飘动 - 余弦波运动，模拟上下浮动
                const verticalFloat = Math.cos(now * d.verticalFrequency + d.phaseOffsetY) * 
                                    d.verticalAmplitude * (1 - easeProgress * 0.4);
                
                // 最终位置
                const currentX = d.startX + horizontalOffset;
                const currentY = baseY + verticalFloat;
                
                // 旋转 - 更慢更自然
                const currentRotate = d.initialRotate + (d.rotateSpeed * 180 * progress);
                
                // 透明度和大小变化 - 更平缓
                const currentOpacity = d.opacity * (1 - easeProgress * 0.3);
                const currentScale = d.scale * (0.9 + 0.1 * (1 - easeProgress)); // 稍微变小
                
                // 轻微的自旋摆动
                const spinSway = Math.sin(now * 0.001 + i) * 1.5;
                
                // 更新样式
                d.element.style.transform = `translate3d(0, 0, 0) rotate(${currentRotate + spinSway}deg) scale(${currentScale})`;
                d.element.style.left = currentX + 'px';
                d.element.style.top = currentY + 'px';
                d.element.style.opacity = currentOpacity.toString();
                
                // 动态发光效果 - 随飘动变化
                const glowIntensity = 0.3 + 0.2 * Math.sin(now * 0.002 + i);
                d.element.style.filter = `drop-shadow(0 0 ${6 + glowIntensity * 4}px rgba(255,255,255,${0.3 + glowIntensity * 0.2}))
                                         drop-shadow(0 0 ${12 + glowIntensity * 6}px rgba(255,255,255,${0.1 + glowIntensity * 0.1}))
                                         brightness(${1.1 + glowIntensity * 0.05})
                                         contrast(1.05)`;
            }
            
            this.animationFrameId = requestAnimationFrame(() => this.animateFloating());
        }
        
        // 缓动函数 - 正弦缓动，最自然的运动
        easeInOutSine(t) {
            return -(Math.cos(Math.PI * t) - 1) / 2;
        }
        
        // 指数缓出 - 像羽毛一样飘落
        easeOutExpo(t) {
            return t === 1 ? 1 : 1 - Math.pow(2, -10 * t);
        }
        
        // 清理
        cleanup() {
            if (this.animationFrameId) {
                cancelAnimationFrame(this.animationFrameId);
            }
            this.dandelions.forEach(d => {
                if (d.element.parentNode) {
                    d.element.parentNode.removeChild(d.element);
                }
            });
            this.dandelions = [];
        }
    }
    
    // 页面加载后初始化
    let dandelionManager;
    
    function init() {
        console.log('初始化飘逸蒲公英效果');
        dandelionManager = new DandelionManager();
    }
    
    if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', init);
    } else {
        init();
    }
    
    // 窗口调整
    window.addEventListener('resize', function() {
        if (dandelionManager) {
            dandelionManager.cleanup();
            setTimeout(() => {
                dandelionManager = new DandelionManager();
            }, 200);
        }
    });
    
    // 页面可见性变化
    document.addEventListener('visibilitychange', function() {
        if (dandelionManager) {
            if (document.hidden) {
                if (dandelionManager.animationFrameId) {
                    cancelAnimationFrame(dandelionManager.animationFrameId);
                    dandelionManager.animationFrameId = null;
                }
            } else {
                if (!dandelionManager.animationFrameId) {
                    dandelionManager.animateFloating();
                }
            }
        }
    });
    </script>
    
    <!-- 背景音乐 -->
    <audio id="bg-music" loop preload="auto" autoplay style="display: none;">
        <source src="/music/bg.mp3" type="audio/mpeg">
        <source src="/music/background.ogg" type="audio/ogg">
        您的浏览器不支持音频元素。
    </audio>
    
    <script>
    // 音乐控制逻辑
    document.addEventListener('DOMContentLoaded', function() {
        const bgMusic = document.getElementById('bg-music');
        
        if (window.location.pathname === '/' || 
            window.location.pathname === '/index.html' ||
            window.location.pathname === '/welcome.html') {
            
            function playMusic() {
                if (bgMusic) {
                    bgMusic.volume = 0.2;
                    bgMusic.playbackRate = 0.9; // 稍慢的音乐速度
                    bgMusic.play().catch(function(error) {
                        console.log('音乐自动播放被阻止:', error);
                        document.body.addEventListener('click', function() {
                            bgMusic.play();
                        }, { once: true });
                    });
                }
            }
            
            setTimeout(playMusic, 1000);
        }
    });
    </script>
</body>
</html>
