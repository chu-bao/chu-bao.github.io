<!DOCTYPE html>
<html>
<head>
    <title>Welcome</title>
    <style>
        body {
            background: url('https://images.unsplash.com/photo-1506744038136-46273834b3fb') center/cover no-repeat;
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
            font-family: 'Segoe UI', sans-serif;
            position: relative;
        }
        body::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.6);
        }
        .content {
            position: relative;
            z-index: 1;
            text-align: center;
            padding: 2rem;
        }
        h1 {
            font-size: 4rem;
            margin-bottom: 1rem;
            letter-spacing: 5px;
        }
        .buttons a {
            color: white;
            border: 2px solid white;
            padding: 12px 40px;
            margin: 0 10px;
            text-decoration: none;
            display: inline-block;
            transition: 0.3s;
        }
        .buttons a:hover {
            background: white;
            color: black;
        }
    </style>
</head>
<body>
    <div class="content">
        <h1>SYLVIE</h1>
        <div class="buttons">
            <a href="/">Blog</a>
            <a href="https://github.com">GitHub</a>
        </div>
    </div>
</body>
</html>
