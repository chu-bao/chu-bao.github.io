title: 归档

<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>归档 · SYLVIE</title>
    <style>
        /* 你的归档页面样式 */
        body {
            font-family: -apple-system, 'Microsoft YaHei', sans-serif;
            background: #f8f9fa;
            color: #1e2e3e;
            line-height: 1.2;
            max-width: 800px;
            margin: 0 auto;
            padding: 2rem;
        }
        .archive-year {
            font-size: 1.2rem;
    color: #FF6600;
    margin: 2rem 0 1rem;
    padding-bottom: 0.5rem;
    border-bottom: 1.5px dashed #FF6600;  /* 橙色虚线 */
        }
        .archive-list {
            list-style: none;
            padding: 0;
        }
        .archive-item {
            display: flex;
            align-items: baseline;
            padding: 0.5rem 0;
            border-bottom: 1px dashed #eee;
        }
        .archive-date {
            color: #666;
            font-size: 0.9rem;
            width: 100px;
        }
        .archive-title a {
            color: #1e2e3e;
            text-decoration: none;
            
        }
        .archive-title a:hover {
            color: #FF6600;
        }
    </style>
</head>
<body>
    <h1 style="font-size: 1.7rem;">📚 文章归档</h1>
    <div id="archive-container">加载中...</div>

    <script>
        fetch('/content.json?t=' + Date.now())
            .then(res => res.json())
            .then(data => {
                let posts = Array.isArray(data) ? data : (data.posts || []);
                posts.sort((a, b) => new Date(b.date) - new Date(a.date));
                
                // 按年份分组
                let years = {};
                posts.forEach(post => {
                    let year = new Date(post.date).getFullYear();
                    if (!years[year]) years[year] = [];
                    years[year].push(post);
                });
                
                // 生成HTML
                let html = '';
                Object.keys(years).sort((a,b) => b - a).forEach(year => {
                    html += `<h2 class="archive-year">${year}年</h2>`;
                    html += `<ul class="archive-list">`;
                    years[year].forEach(post => {
                        let date = new Date(post.date);
                        let dateStr = `${date.getMonth()+1}月${date.getDate()}日`;
                        html += `
                            <li class="archive-item">
                                <span class="archive-date">${dateStr}</span>
                                <span class="archive-title">
                                    <a href="${post.path}">${post.title}</a>
                                </span>
                            </li>
                        `;
                    });
                    html += `</ul>`;
                });
                
                document.getElementById('archive-container').innerHTML = html;
            })
            .catch(() => {
                document.getElementById('archive-container').innerHTML = '暂无文章';
            });
    </script>
</body>
</html>
