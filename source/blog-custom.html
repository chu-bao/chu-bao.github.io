<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>日志 · SYLVIE's Blog</title>
    <meta http-equiv="Content-Security-Policy" content="script-src 'self' 'unsafe-inline' 'unsafe-eval' busuanzi.ibruce.info https://busuanzi.ibruce.info;">
    <script async src="//busuanzi.ibruce.info/busuanzi/2.3/busuanzi.pure.mini.js"></script>
    <style>
        /* 全局样式 - 深色背景 */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        html, body {
            height: 100%;
            /* 无衬线黑体字体栈 */
            font-family: "Helvetica Neue", "Helvetica", "Arial", "Hei", "Microsoft YaHei", "PingFang SC", sans-serif;
            background-color: #282c34;  /* 外层深色背景 */
            color: #ffffff;  /* 全局文字默认白色 */
            line-height: 1.6;
        }
        
        /* 外层容器 - 深色背景 */
        .page-wrapper {
            background-color: #282c34;
            min-height: 100vh;
            padding: 40px 20px;
            display: flex;
            justify-content: center;
            align-items: flex-start;
        }

        /* ===== 深色主卡片容器 ===== */
        .main-card {
            width: 100%;
            max-width: 780px;
            background-color: #23272e;  /* 卡片深色背景，比外层稍浅一点形成层次 */
            padding: 22px 48px;
            margin: 0 auto;
        }

        /* ===== 顶部区域 ===== */
        .top-section {
            margin-bottom: 32px;
            position: relative;
        }

        /* 站点名称 - 黑体 */
        .site-title {
            font-size: 1.0rem;
            font-weight: 150;
            letter-spacing: 0.5px;
            color: #ffffff;
            margin-bottom: 8px;
            text-align: left;
            opacity: 0.95;
            font-family: "Helvetica Neue", "Helvetica", "Arial", "Hei", "Microsoft YaHei", "PingFang SC", sans-serif;
        }

        /* 进度条容器 */
        .progress-container {
            width: 100%;
            height: 3px;
            background-color:#403e3e;
            margin-bottom: 16px;
        }

        /* 进度条 - 动态宽度 */
        .progress-bar {
            height: 3px;
            background-color: #d19a66;
            width: 0%;
            transition: width 0.1s ease;
        }

        /* 导航菜单 - 黑体 */
        .nav-menu {
            display: flex;
            gap: 24px;
            margin: 0;
            padding: 0;
        }

        .nav-link {
            padding: 4px 0;
            text-decoration: none;
            color: rgba(255, 255, 255, 0.7);
            font-size: 0.9rem;
            font-weight: 650;
            transition: all 0.2s ease;
            letter-spacing: 0.5px;
            border-bottom: 1px solid transparent;
            font-family: "Helvetica Neue", "Helvetica", "Arial", "Hei", "Microsoft YaHei", "PingFang SC", sans-serif;
        }

        .nav-link:hover {
            color: #d19a66;
        }

        .nav-link.active {
            color: #d19a66;
            border-bottom-color: #d19a66;
        }

        /* ===== 文章列表 ===== */
        .posts-list {
            list-style: none;
            margin-top: 24px;
        }

        /* 文章项 - 使用flex布局 */
        .post-item {
            display: flex;
            align-items: center;
            padding: 10px 0;
            gap: 16px;
        }

        .post-item:last-child {
            border-bottom: none;
        }

        /* 左侧小图片容器 */
        .post-image {
            width: 50px;
            height: 50px;
            border-radius: 8px;
            overflow: hidden;
            background-color: #f5f5f5;
            flex-shrink: 0;
        }

        .post-image img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        /* 右侧内容容器 - 采用上下布局 */
        .post-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            min-width: 0;
            justify-content: center;
            padding: 2px 0;
        }

        /* 标题 */
        .post-title {
            font-size: 0.8rem;
            font-weight: 550;
            color: #d19a66;
            text-decoration: none;
            transition: color 0.2s ease;
            margin-bottom: 4px;
            line-height: 1.4;
            word-break: break-word;
            font-family: "Helvetica Neue", "Helvetica", "Arial", "Hei", "Microsoft YaHei", "PingFang SC", sans-serif;
        }

        .post-title:hover {
            color: #ffffff;
        }

        /* 底部信息行 */
        .post-footer {
            display: flex;
            align-items: center;
            justify-content: space-between;
            width: 100%;
        }
        /* 站点名称前面的小图片 */
.site-logo-img {
    width: 35px;
    height: 35px;
    margin-right: 6px;
    transform: translateY(2px);
    
    object-fit: cover;
}
        /* 日期 */
        .post-date {
            font-size: 0.8rem;
            color: rgba(255, 255, 255, 0.5);
            font-family: "Helvetica Neue", "Helvetica", "Arial", "Hei", "Microsoft YaHei", "PingFang SC", sans-serif;
        }

        /* 不蒜子容器 - 移除原来的 .post-meta span 样式，改为专门针对浏览数的样式 */
        .post-meta {
            display: flex;
            align-items: center;
        }

        .post-meta #busuanzi_container_page_pv {
            display: inline-block;
            min-width: 30px;
            text-align: center;
        }

        /* 浏览数字样式 */
        .post-meta .busuanzi_value_page_pv {
            color: #000000;
            background-color: #d19a66;
            padding: 0px 8px;
            border-radius: 10px;
            font-size: 0.7rem;
            font-weight: 500;
            line-height: 1.4;
            display: inline-block;
        }

        /* 加载状态 */
        .loading-state, .error-state, .empty-state {
            text-align: center;
            padding: 40px 20px;
            background-color: rgba(255, 255, 255, 0.05);
            border-radius: 16px;
            color: rgba(255, 255, 255, 0.7);
            margin-top: 24px;
            font-weight: 300;
            border: 1px solid rgba(255, 255, 255, 0.05);
            font-family: "Helvetica Neue", "Helvetica", "Arial", "Hei", "Microsoft YaHei", "PingFang SC", sans-serif;
        }

        /* 错误状态特殊颜色 */
        .error-state {
            color: #ff6b6b;
        }

        /* 响应式调整 */
        @media (max-width: 768px) {
            .page-wrapper {
                padding: 20px 16px;
            }
            .main-card {
                padding: 28px 24px;
                border-radius: 20px;
            }
            .nav-menu {
                gap: 16px;
                flex-wrap: wrap;
            }
            .post-item {
                gap: 12px;
            }
            .post-image {
                width: 48px;
                height: 48px;
            }
            .post-title {
                font-size: 0.95rem;
            }
        }
    </style>
</head>
<body>
    <!-- 深色背景容器 -->
    <div class="page-wrapper">
        <!-- 深色主卡片 -->
        <div class="main-card">
            <!-- 顶部区域：站点名称 + 进度条 + 导航 -->
            <div class="top-section">
                <div class="site-title">
                <img src="/images/头像1.png" alt="logo" class="site-logo-img">
                 SYLVIE's Blog
                </div>
                
                <!-- 进度条 -->
                <div class="progress-container">
                    <div class="progress-bar" id="progressBar"></div>
                </div>

                <!-- 导航菜单 -->
                <div class="nav-menu">
                    <a href="/" class="nav-link">首页</a>
                    <a href="/blog-custom.html" class="nav-link active">日志</a>
                    <a href="/categories/" class="nav-link">分类</a>
                    <a href="/guestbook.html" class="nav-link">留言</a>
                </div>
            </div>

            <!-- 文章列表容器 -->
            <main class="posts-list" id="posts-container">
                <div class="loading-state">📚 加载文章中...</div>
            </main>
        </div>
    </div>

    <script>
    // ===== 阅读进度条功能 =====
    window.addEventListener('scroll', function() {
        const winScroll = document.documentElement.scrollTop;
        const height = document.documentElement.scrollHeight - document.documentElement.clientHeight;
        const scrolled = (winScroll / height) * 100;
        document.getElementById('progressBar').style.width = scrolled + '%';
    });

    // ===== 文章加载功能 =====
    (function() {
        const container = document.getElementById('posts-container');
        
        container.innerHTML = '<div class="loading-state">📚 加载文章中...</div>';
        
        fetch('/content.json?t=' + Date.now())
            .then(response => {
                if (!response.ok) throw new Error('content.json 不存在');
                return response.json();
            })
            .then(data => {
                let posts = Array.isArray(data) ? data : (data.posts || []);
                
                if (posts.length === 0) {
                    container.innerHTML = '<div class="empty-state">📭 暂无文章</div>';
                    return;
                }
                
                // 按日期倒序排序
                posts.sort((a, b) => new Date(b.date) - new Date(a.date));
                
                let html = '';
                posts.forEach(post => {
                    let dateStr = '日期未知';
                    try {
                        const d = new Date(post.date);
                        dateStr = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
                    } catch(e) {}
                    
                    const postPath = post.path.startsWith('/') ? post.path : '/' + post.path;
                    const link = `/post-template.html?path=${encodeURIComponent(postPath)}`;
                    const thumbnail = post.thumbnail || '/images/default-post.jpg';
                    
                    html += `
                        <div class="post-item">
                            <div class="post-image">
                                <img src="${thumbnail}" alt="${post.title}" loading="lazy">
                            </div>
                            <div class="post-content">
                                <a href="${link}" class="post-title">${post.title || '无标题'}</a>
                                <div class="post-footer">
                                    <span class="post-date">${dateStr}</span>
                                    <div class="post-meta">
                                        <span id="busuanzi_container_page_pv">
                                            <span class="busuanzi_value_page_pv"></span>
                                        </span>
                                    </div>
                                </div>
                            </div>
                        </div>
                    `;
                });
                
                container.innerHTML = html;
            })
            .catch(error => {
                container.innerHTML = `
                    <div class="error-state">
                        <span style="font-size:1.5rem;">⚠️</span>
                        <h3 style="color:#ff6b6b;">加载失败</h3>
                        <p>${error.message}</p>
                    </div>
                `;
            });
    })();
    </script>
</body>
</html>
